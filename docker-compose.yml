services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playchess-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://playchess:playchess_dev_password@postgres:5432/playchess_db
      NODE_ENV: production
    command: sh -c "pnpm prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - default

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playchess-app
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.playchess.rule=Host(`playchess.pydti.com`)
      - traefik.http.routers.playchess.entrypoints=websecure
      - traefik.http.routers.playchess.tls=true
      - traefik.http.services.playchess.loadbalancer.server.port=3000

  postgres:
    image: postgres:16-alpine
    container_name: playchess-postgres
    environment:
      POSTGRES_USER: playchess
      POSTGRES_PASSWORD: playchess_dev_password
      POSTGRES_DB: playchess_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playchess"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  proxy:
    external: true
