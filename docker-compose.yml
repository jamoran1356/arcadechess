services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playchess-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      NODE_ENV: production
      PRISMA_BASELINE_MIGRATION: 202603300001_init
    command: >-
      sh -c "
      pnpm prisma migrate resolve --applied 20260405_rating_zero_and_ban_system 2>/dev/null;
      pnpm prisma migrate deploy ||
      (echo 'Intentando baseline de migracion inicial...' &&
      pnpm prisma migrate resolve --applied $${PRISMA_BASELINE_MIGRATION} &&
      pnpm prisma migrate deploy)
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - default

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playchess-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.playchess.rule=Host(`playchess.pydti.com`)
      - traefik.http.routers.playchess.entrypoints=websecure
      - traefik.http.routers.playchess.tls=true
      - traefik.http.services.playchess.loadbalancer.server.port=3000

  postgres:
    image: postgres:16-alpine
    container_name: playchess-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  proxy:
    external: true
