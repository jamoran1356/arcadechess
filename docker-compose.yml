services:
  postgres:
    image: postgres:16-alpine
    container_name: playchess-postgres
    environment:
      POSTGRES_USER: playchess
      POSTGRES_PASSWORD: playchess_dev_password
      POSTGRES_DB: playchess_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playchess"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
